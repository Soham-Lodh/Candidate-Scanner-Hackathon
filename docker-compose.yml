services:
  candidate-ranker:
    build: .
    ports:
      - "8501:8501"
      - "8765:8765"
    env_file:
      - .env
    environment:
      STREAMLIT_SERVER_MAX_UPLOAD_SIZE: "500"
      STREAMLIT_SERVER_MAX_MESSAGE_SIZE: "500"
      CANDIDATE_UPLOAD_HOST: "0.0.0.0"
      CANDIDATE_UPLOAD_PORT: "8765"
      CANDIDATE_UPLOAD_PUBLIC_URL: "http://localhost:8765"
    volumes:
      - ./.cache:/app/.cache
      - ./work:/app/work
