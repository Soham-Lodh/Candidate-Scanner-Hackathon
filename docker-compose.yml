services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: candidate-scanner
    mem_limit: 16g
    memswap_limit: 16g
    cpus: "8"

    ports:
      - "8501:8501"
      - "8765:8765"

    environment:
      OPENROUTER_API_KEY: ""
      OPENROUTER_BASE_URL: "https://openrouter.ai/api/v1/chat/completions"
      OPENROUTER_PRIMARY_MODEL: "deepseek/deepseek-chat-v3-0324"
      OPENROUTER_TIMEOUT_SECONDS: "45"

      DEPLOYMENT_TARGET: "streamlit"

      CANDIDATE_UPLOAD_HOST: "0.0.0.0"
      CANDIDATE_UPLOAD_PORT: "8765"
      CANDIDATE_UPLOAD_PUBLIC_URL: "http://localhost:8765"

      APP_TOP_K_RETRIEVAL: "5000"
      APP_TOP_K_FEATURES: "500"
      APP_TOP_K_EXPLAIN: "100"
      APP_ENABLE_AI_EXPLANATIONS: "0"

    volumes:
      - ./work:/app/work

    restart: unless-stopped