ai_usage_summary: |
  Claude was used for architecture design, code reviews, and implementation planning.
  OpenAI Codex assisted with code generation, debugging, and feature implementation.
  ChatGPT was used for bug fixing, debugging, and iterative improvements.
  Gamma was used to create and organize presentation content.
  All candidate ranking logic, scoring methodology, and final evaluation behavior were implemented and validated by the team.

methodology_summary: |
  The system uses a two-stage ranking pipeline designed for scalability, explainability, and reproducibility. First, an LLM analyzes the job description once and extracts structured hiring intelligence, including required skills, seniority, experience expectations, responsibilities, education, location preferences, and behavioral signals. This output is cached and reused, ensuring no LLM calls are required during candidate ranking.
  Candidate schemas are mapped dynamically, allowing the platform to adapt to different JSON structures without hardcoded field names. A semantic retrieval layer (FAISS + embeddings, with deterministic fallback support) narrows large candidate pools before detailed evaluation.
  Retrieved candidates are scored using a deterministic multi-signal engine combining technical fit, role relevance, behavioral indicators, and trust/integrity signals. The methodology evaluates factors such as skill coverage, experience alignment, semantic relevance, seniority fit, career consistency, production experience, availability, education, and profile quality. Must-have requirements act as gating signals, while integrity heuristics penalize suspicious, incomplete, or keyword-stuffed profiles.
  Final rankings are generated through weighted composite scoring and accompanied by evidence-based explanations, producing transparent, auditable, and reproducible hiring recommendations at 100K+ candidate scale on CPU-only infrastructure.

